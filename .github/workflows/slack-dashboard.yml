name: Monthly Site Report

on:
  schedule:
    - cron: "27 6 1 * *"
  workflow_dispatch:

concurrency:
  group: monthly-site-report
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  monthly-site-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build audience report
        env:
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SEARCH_CONSOLE_TOKEN: ${{ secrets.GOOGLE_SEARCH_CONSOLE_TOKEN }}
          GOOGLE_SEARCH_CONSOLE_SITE_URL: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SITE_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          BUTTONDOWN_API_VERSION: ${{ secrets.BUTTONDOWN_API_VERSION }}
        run: node scripts/audience-dashboard.mjs

      - name: Send report to Slack DM
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_REPORT_DM_USER: ${{ vars.SLACK_REPORT_DM_USER }}
        run: node scripts/send-monthly-site-report-slack.mjs

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-site-report
          path: |
            tmp/audience-dashboard.json
            tmp/audience-dashboard.md

      - name: Write workflow summary
        if: always()
        run: |
          if [ -f tmp/audience-dashboard.md ]; then
            cat tmp/audience-dashboard.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open or update issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('tmp/audience-dashboard.md')
              ? fs.readFileSync('tmp/audience-dashboard.md', 'utf8')
              : 'Monthly site report failed before report generation.';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Monthly Site Report Alert';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'monthly-site-report'
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['monthly-site-report']
              });
            }

      - name: Close open issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Monthly Site Report Alert';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'monthly-site-report'
            });
            for (const issue of issues) {
              if (issue.title === title) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: `Recovered at ${new Date().toISOString()}.`
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
              }
            }
