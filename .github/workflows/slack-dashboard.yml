name: Slack Dashboard

on:
  schedule:
    - cron: "27 6 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  slack-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build monthly Slack dashboard
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_DASHBOARD_CHANNELS: ${{ vars.SLACK_DASHBOARD_CHANNELS }}
        run: node scripts/slack-dashboard.mjs

      - name: Upload Slack artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slack-dashboard
          path: |
            tmp/slack-dashboard.json
            tmp/slack-dashboard.md

      - name: Write workflow summary
        if: always()
        run: |
          if [ -f tmp/slack-dashboard.md ]; then
            cat tmp/slack-dashboard.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open or update issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('tmp/slack-dashboard.md')
              ? fs.readFileSync('tmp/slack-dashboard.md', 'utf8')
              : 'Slack dashboard failed before report generation.';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Slack Dashboard Alert';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'slack-dashboard'
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['slack-dashboard']
              });
            }

      - name: Close open issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Slack Dashboard Alert';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'slack-dashboard'
            });
            for (const issue of issues) {
              if (issue.title === title) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: `Recovered at ${new Date().toISOString()}.`
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
              }
            }
